<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <title>Log Ghost</title>
  <defs>
    <linearGradient id="lg-trail" x1="8" y1="80" x2="72" y2="44" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8AEF5"/>
      <stop offset="0.45" stop-color="#7F77DD"/>
      <stop offset="1" stop-color="#5EE7EB"/>
    </linearGradient>
    <linearGradient id="lg-card" x1="16" y1="8" x2="112" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7569DC"/>
      <stop offset="1" stop-color="#4F3FA8"/>
    </linearGradient>
  </defs>
  <!-- purple squircle -->
  <rect x="6" y="6" width="116" height="116" rx="30" fill="url(#lg-card)"/>
  <!-- speed trail -->
  <path
    d="M14 86c8-2 20-8 32-20 10-8 6-20-2-16-4 2-4 6 2 8 4 1 6-1 6-1"
    stroke="url(#lg-trail)"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="none"
    opacity="0.9"
  />
  <path
    d="M20 78c8-1 20-5 32-16"
    stroke="url(#lg-trail)"
    stroke-width="2.2"
    stroke-linecap="round"
    fill="none"
    opacity="0.65"
  />
  <!-- ghost: scaled from 32px silhouette, white, centered on card -->
  <g transform="translate(30 22) scale(2.15)">
    <path
      fill="#F7F7FC"
      d="M16 3C10 3 6 7 6 12v3c-1.5 0-2.5.8-2.5 2s1 2 2.5 2h1.5V26c0 2.2 1.8 4 4 4h2c.6 0 1-.4 1-1s-.4-1-1-1h-1c-1.1 0-2-.9-2-2V19h6v-4c4 0 7-2.2 7-5 0-5-4-7-8-7z"
    />
    <circle cx="12.5" cy="11.2" r="1.2" fill="#1B1B22"/>
    <circle cx="19.2" cy="11.2" r="1.2" fill="#1B1B22"/>
    <path d="M13.2 16.2c1.2 0.7 2.4 0.7 4.4 0" stroke="#1B1B22" stroke-width="0.9" stroke-linecap="round" fill="none"/>
  </g>
</svg>
